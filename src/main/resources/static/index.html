<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BidMart Auth - Frontend Demo</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; gap: 2rem; padding: 2rem; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #004494; }
        .result { margin-top: 15px; font-size: 0.9em; word-wrap: break-word; }
        pre { background-color: #eee; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="card">
    <h3>Daftar Akun Baru</h3>
    <form id="registerForm">
        <input type="text" id="regName" placeholder="Nama Lengkap" required>
        <input type="email" id="regEmail" placeholder="Email" required>
        <input type="password" id="regPassword" placeholder="Password" required>
        <button type="submit">Daftar</button>
    </form>
    <div id="regResult" class="result"></div>
</div>

<div class="card">
    <h3>Login</h3>
    <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <div id="loginResult" class="result"></div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const resultDiv = document.getElementById('regResult');
        resultDiv.innerHTML = "Memproses...";

        const payload = {
            name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPassword').value
        };

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const text = await response.text();
                resultDiv.innerHTML = `<span style="color: green;">${text}</span>`;
            } else {
                const err = await response.text();
                resultDiv.innerHTML = `<span style="color: red;">${err}</span>`;
            }
        } catch (error) {
            resultDiv.innerHTML = `<span style="color: red;">Gagal terhubung ke server.</span>`;
        }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const resultDiv = document.getElementById('loginResult');
        resultDiv.innerHTML = "Memproses...";

        const payload = {
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
        };

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const data = await response.json();
                resultDiv.innerHTML = `
                        <span style="color: green;">Login Berhasil!</span>
                        <p><strong>Access Token:</strong></p>
                        <pre>${data.accessToken}</pre>
                    `;
            } else {
                resultDiv.innerHTML = `<span style="color: red;">Email atau password salah!</span>`;
            }
        } catch (error) {
            resultDiv.innerHTML = `<span style="color: red;">Gagal terhubung ke server.</span>`;
        }
    });
</script>
</body>
</html>
