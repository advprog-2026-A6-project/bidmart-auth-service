name: CI/CD Pipeline

on:
  push:
    branches: [ "staging", "main" ]
  pull_request:
    branches: [ "staging", "main" ]

permissions:
  contents: read
  pull-requests: read

jobs:
  build-test-lint-sonar:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Validate SonarCloud configuration
        run: |
          set -euo pipefail
          test -n "${SONAR_TOKEN}" || (echo "SONAR_TOKEN is not set" && exit 1)
          test -n "${SONAR_PROJECT_KEY}" || (echo "SONAR_PROJECT_KEY is not set" && exit 1)
          test -n "${SONAR_ORGANIZATION}" || (echo "SONAR_ORGANIZATION is not set" && exit 1)

      - name: Test + Lint + Coverage
        run: ./gradlew --no-daemon clean check jacocoTestReport

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.sources=src/main
            -Dsonar.tests=src/test
            -Dsonar.java.binaries=build/classes
            -Dsonar.junit.reportPaths=build/test-results/test
            -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

  dummy-deployment:
    name: Dummy CD Deployment
    needs: build-test-lint-sonar
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Simulate Deployment Process
        run: |
          echo "CI passed successfully! Code quality check passed. Memulai proses deployment..."
          
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "Deploying to PRODUCTION environment (Dummy)..."
          elif [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            echo "Deploying to STAGING environment (Dummy)..."
          fi
          
          echo "Dummy Deployment selesai!"